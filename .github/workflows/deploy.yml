name: Auto Deploy PWA

# 每次代码推送到 main 分支时触发
on:
  push:
    branches: ["main"] # 如果你的主分支叫 master，请改成 "master"

# 赋予 GitHub Actions 部署 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 核心魔法：部署前，将 sw.js 中的占位符替换为当前的 UNIX 时间戳
      # 终极魔法：强制在 sw.js 第一行写入当前时间戳，绝不会因为占位符写错而失效
      - name: Force Update Service Worker
        run: |
          echo "// AUTO-UPDATE: $(date +%s)" | cat - sw.js > temp && mv temp sw.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
