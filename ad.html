<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fdfbf7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#2a2622">
  <title>莱特纳盒子 - 科学记忆，告别遗忘</title>
  <style>
    :root {
      --bg-gradient-1: #fdfbf7; --bg-gradient-2: #ede4d6;
      --card-bg: rgba(255, 255, 255, 0.85); --card-border: rgba(255, 255, 255, 0.4);
      --card-shadow: 0 24px 48px rgba(139, 122, 101, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      --text-main: #4d3e2f; --text-sub: #8b7a65; --text-list: #5e4b3c;
      --primary: #b89b7b; --primary-bg: rgba(184, 155, 123, 0.2);
      --btn-grad-1: #c2a382; --btn-grad-2: #ab8a66;
      --testi-bg: rgba(250, 247, 242, 0.8); --testi-border: rgba(184, 155, 123, 0.15);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-gradient-1: #2a2622; --bg-gradient-2: #1e1b18;
        --card-bg: rgba(42, 38, 34, 0.85); --card-border: rgba(255, 255, 255, 0.05);
        --card-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        --text-main: #e8dfd4; --text-sub: #a89a8a; --text-list: #d9cdbc;
        --primary: #ab8a66; --primary-bg: rgba(171, 138, 102, 0.2);
        --btn-grad-1: #ab8a66; --btn-grad-2: #8b7a65;
        --testi-bg: rgba(30, 27, 24, 0.8); --testi-border: rgba(184, 155, 123, 0.1);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top left, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      padding: 20px; color: var(--text-list); transition: background 0.3s;
    }
    .card {
      background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 32px; padding: 40px 32px; max-width: 420px; width: 100%;
      box-shadow: var(--card-shadow); border: 1px solid var(--card-border);
      text-align: center; transition: all 0.3s;
    }
    .logo-icon {
      width: 72px; height: 72px; margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--btn-grad-1) 0%, var(--btn-grad-2) 100%);
      border-radius: 20px; display: flex; justify-content: center; align-items: center;
      box-shadow: 0 12px 24px rgba(184, 155, 123, 0.3); color: white;
    }
    h1 { font-size: 2.2rem; color: var(--text-main); margin-bottom: 12px; letter-spacing: -0.5px; }
    .sub { color: var(--text-sub); font-size: 1.05rem; margin-bottom: 32px; line-height: 1.6; }
    .highlight { color: var(--primary); font-weight: 700; position: relative; }
    .highlight::after {
      content: ""; position: absolute; bottom: 2px; left: 0; width: 100%; height: 6px;
      background: var(--primary-bg); z-index: -1; border-radius: 4px;
    }
    .feature-list { text-align: left; margin: 0 auto 32px; max-width: 320px; list-style: none; }
    .feature-list li { margin: 12px 0; font-size: 1rem; display: flex; align-items: center; gap: 10px; color: var(--text-list); }
    .check-icon { color: var(--primary); flex-shrink: 0; }
    .cta-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--btn-grad-1) 0%, var(--btn-grad-2) 100%); color: white;
      padding: 16px 36px; border-radius: 40px; font-weight: 600; font-size: 1.15rem;
      text-decoration: none; margin: 16px 0; width: 100%;
      box-shadow: 0 12px 28px rgba(184, 155, 123, 0.4); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(184, 155, 123, 0.5); }
    .cta-btn:active { transform: translateY(1px); box-shadow: 0 8px 16px rgba(184, 155, 123, 0.4); }
    .testimonial {
      background: var(--testi-bg); border-radius: 20px; padding: 20px; margin-top: 28px;
      font-size: 0.95rem; color: var(--text-list); font-style: italic; line-height: 1.6;
      border: 1px solid var(--testi-border); transition: all 0.3s;
    }
    .testimonial-author { font-style: normal; font-weight: 600; color: var(--primary); margin-top: 12px; font-size: 0.9rem; }
    .footer-text { font-size: 0.8rem; color: var(--text-sub); margin-top: 32px; line-height: 1.8; }
    .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .footer-text a:hover { text-decoration: underline; }
  </style>
</head>
