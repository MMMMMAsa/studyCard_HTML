      margin-top: 20px; font-size: 0.9rem; color: #5e4b3c;
      font-style: italic; position: relative;

    .testimonial::before { content: "“"; font-size: 2rem; color: #b89b7b; position: absolute; top: -10px; left: 10px; }
    .testimonial-author { font-style: normal; font-weight: 600; color: #b89b7b; margin-top: 8px; }
